name: Publish

# Publish the Achiral Jentic Mini image to GHCR.
# Rewired to gate on upstream's unified "CI" workflow (ci.yml) via workflow_run,
# since the legacy ci-backend.yml / ci-docker.yml reusable workflows were removed
# upstream (chore(oss): remove legacy jentic-mini content). workflow_dispatch is
# kept for manual versioned publishes.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0). Leave empty for :unstable.'
        required: false
        type: string

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    # Only publish when the triggering CI run succeeded (workflow_run) or on
    # manual dispatch. Skipped/cancelled/failed CI runs must not publish.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          # For workflow_run, build the exact commit CI ran on (head_sha), not
          # the default-branch tip at dispatch time. Falls back to github.ref
          # for workflow_dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 1

      - name: Determine version
        id: version
        run: |
          ver="${{ inputs.version }}"
          if [ -n "$ver" ]; then
            echo "version=$ver" >> "$GITHUB_OUTPUT"
            echo "minor=${ver%.*}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=unstable" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
          # sha of the commit being built (CI head_sha for workflow_run), used
          # for the immutable sha-<sha> image tag.
          echo "sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/achiral-ai/jentic-mini
          tags: |
            type=raw,value=sha-${{ steps.version.outputs.sha }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.is_release }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ steps.version.outputs.is_release }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_release }}
            type=raw,value=unstable,enable=${{ steps.version.outputs.is_release == 'false' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
